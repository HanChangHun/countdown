<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1545">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Meeting Countdown</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1545;
      color: #fff;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .bg {
      position: fixed;
      top: -50px;
      left: -50px;
      right: -50px;
      bottom: -50px;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      z-index: -2;
    }

    .container {
      text-align: center;
      padding: clamp(1.5rem, 3vw, 3rem);
      max-width: min(80vw, 820px);
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: rgba(192, 132, 252, 0.12);
      border: 1px solid rgba(192, 132, 252, 0.28);
      border-radius: 20px;
      padding: clamp(4px, 0.7vh, 8px) clamp(12px, 1.8vw, 20px);
      font-size: clamp(0.65rem, 0.9vw, 0.85rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: clamp(0.6rem, 1.4vh, 1.2rem);
      backdrop-filter: blur(10px);
      color: rgba(230, 220, 255, 0.95);
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    .badge[data-state="started"] {
      background: rgba(244, 114, 182, 0.14);
      border-color: rgba(244, 114, 182, 0.35);
      color: #fbcfe8;
    }

    h1 {
      position: relative;
      display: block;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      font-size: clamp(2rem, 4vw, 4rem);
      font-weight: 700;
      margin-bottom: clamp(0.4rem, 1vh, 0.8rem);
      background: linear-gradient(to right, #f7797d, #FBD786);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      outline: none;
      cursor: text;
      padding: 0.05em 0.35em;
      border-radius: 10px;
      min-height: 1.2em;
      min-width: 4ch;
      transition: background-color 0.2s;
    }

    h1:hover { background-color: rgba(255,255,255,0.05); }
    h1:focus { background-color: rgba(255,255,255,0.09); }

    h1::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: 0.05em;
      height: 1px;
      background: linear-gradient(to right,
        transparent,
        rgba(255, 255, 255, 0.45),
        transparent);
      opacity: 0;
      transform: scaleX(0.4);
      transform-origin: center;
      transition: opacity 0.25s ease, transform 0.3s ease;
      pointer-events: none;
    }

    h1:hover::after { opacity: 1; transform: scaleX(1); }
    h1:focus::after { opacity: 0; }

    h1:empty::before {
      content: attr(data-placeholder);
      -webkit-text-fill-color: rgba(255, 255, 255, 0.32);
      color: rgba(255, 255, 255, 0.32);
      background: none;
      font-weight: 500;
      font-style: italic;
      letter-spacing: -0.3px;
    }

    h1:focus:empty::before { opacity: 0.6; }

    .meta-target {
      font-size: clamp(0.9rem, 1.25vw, 1.15rem);
      color: rgba(255, 255, 255, 0.7);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
      margin-bottom: 0.2rem;
    }

    .meta-now {
      font-size: clamp(0.7rem, 0.9vw, 0.85rem);
      color: rgba(255, 255, 255, 0.35);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
      margin-bottom: clamp(1.2rem, 3vh, 2.4rem);
    }

    .meta-label {
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-right: 0.5em;
      opacity: 0.7;
      font-size: 0.85em;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: clamp(0.6rem, 1.5vw, 1.5rem);
      margin-bottom: clamp(1rem, 2vh, 2rem);
      flex-wrap: wrap;
      min-height: clamp(7rem, 16vh, 12rem);
      align-items: center;
    }

    .unit {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: clamp(10px, 1.2vw, 18px);
      padding: clamp(1rem, 2.4vh, 2.4rem) 0;
      width: clamp(80px, 12vw, 160px);
      backdrop-filter: blur(20px);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .unit:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(192, 132, 252, 0.2);
    }

    .unit .number {
      font-size: clamp(2rem, 4.2vw, 4.2rem);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(to bottom, #fff, rgba(255, 255, 255, 0.7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .unit .label {
      font-size: clamp(0.55rem, 0.9vw, 0.85rem);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: clamp(0.3rem, 0.6vh, 0.6rem);
    }

    .elapsed {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.3rem, 0.8vh, 0.6rem);
    }

    .elapsed .number {
      font-size: clamp(2rem, 4.2vw, 4.2rem);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      background: linear-gradient(to right, #f472b6, #fb7185);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .elapsed .label {
      font-size: clamp(0.65rem, 1vw, 0.95rem);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(251, 113, 133, 0.85);
    }

    .unset-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255, 255, 255, 0.45);
      font-size: clamp(0.95rem, 1.4vw, 1.2rem);
      letter-spacing: 0.5px;
    }

    .unset-prompt .hint {
      font-size: clamp(0.7rem, 0.95vw, 0.85rem);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.25);
    }

    .badge[data-state="unset"] {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.55);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(0.4rem, 1vw, 0.8rem);
      flex-wrap: wrap;
      margin-top: clamp(0.8rem, 2vh, 1.6rem);
    }

    input[type="date"], select, button {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 10px;
      height: clamp(2.4rem, 4.6vh, 2.9rem);
      padding: 0 clamp(0.8rem, 1.5vw, 1.2rem);
      font-size: clamp(0.8rem, 1.1vw, 1rem);
      font-family: inherit;
      line-height: 1;
      backdrop-filter: blur(10px);
      transition: background 0.2s, border-color 0.2s;
      box-sizing: border-box;
    }

    input[type="date"] {
      color-scheme: dark;
    }

    select {
      appearance: none;
      cursor: pointer;
      padding-right: clamp(1.6rem, 2.2vw, 2rem);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='none' stroke='%23ffffffaa' stroke-width='1.5' d='M1 1l4 4 4-4'/></svg>");
      background-repeat: no-repeat;
      background-position: right clamp(0.6rem, 1vw, 0.9rem) center;
    }

    select option { background: #1a1545; color: #fff; }

    input[type="date"]:hover,
    input[type="date"]:focus,
    select:hover,
    select:focus,
    button:hover {
      background-color: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.35);
      outline: none;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    button.primary {
      background: linear-gradient(135deg, rgba(192,132,252,0.4), rgba(244,114,182,0.3));
      border-color: rgba(244,114,182,0.45);
      color: #fff;
    }

    button.primary:hover {
      background: linear-gradient(135deg, rgba(192,132,252,0.55), rgba(244,114,182,0.45));
      border-color: rgba(244,114,182,0.65);
    }

    .preset-label {
      font-size: clamp(0.65rem, 0.9vw, 0.8rem);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: clamp(1rem, 2.5vh, 1.8rem);
      margin-bottom: 0.4rem;
    }

    .preset-row {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .preset-row button {
      height: auto;
      padding: 0.4rem 0.9rem;
      font-size: clamp(0.7rem, 0.9vw, 0.85rem);
      border-radius: 14px;
    }

    .footer-hint {
      margin-top: clamp(1.6rem, 3.5vh, 2.8rem);
      font-size: clamp(0.65rem, 0.85vw, 0.78rem);
      color: rgba(255, 255, 255, 0.22);
      letter-spacing: 0.4px;
      font-style: italic;
      transition: color 0.3s ease;
    }

    .footer-hint:hover { color: rgba(255, 255, 255, 0.45); }

    .particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    @media (max-width: 600px) {
      .container { max-width: 100%; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="badge" id="badge">UPCOMING</div>
    <h1 id="title" contenteditable="true" spellcheck="false" data-placeholder="Click to name" title="Click to rename">Meeting</h1>
    <p class="meta-target"><span class="meta-label">Target</span><span id="metaTarget">--</span></p>
    <p class="meta-now"><span class="meta-label">Now</span><span id="metaNow">--</span></p>

    <div class="countdown" id="countdown">
      <div class="unit">
        <div class="number" id="days">--</div>
        <div class="label">Days</div>
      </div>
      <div class="unit">
        <div class="number" id="hours">--</div>
        <div class="label">Hours</div>
      </div>
      <div class="unit">
        <div class="number" id="minutes">--</div>
        <div class="label">Min</div>
      </div>
      <div class="unit">
        <div class="number" id="seconds">--</div>
        <div class="label">Sec</div>
      </div>
    </div>

    <div class="controls">
      <input type="date" id="dateInput">
      <select id="hourInput" aria-label="Hour"></select>
      <span style="opacity:0.5">:</span>
      <select id="minuteInput" aria-label="Minute"></select>
      <button class="primary" id="setBtn">Set</button>
    </div>
    <p class="preset-label">Adjust target</p>
    <div class="preset-row">
      <button data-preset="-60">−1 hour</button>
      <button data-preset="-15">−15 min</button>
      <button data-preset="-5">−5 min</button>
      <button data-preset="5">+5 min</button>
      <button data-preset="15">+15 min</button>
      <button data-preset="60">+1 hour</button>
      <button data-preset="1440">+1 day</button>
    </div>
    <p class="footer-hint">psst… click the title above to rename it</p>
  </div>

  <script>
    const STORAGE_KEY = 'ch-countdown:v1';
    const DAYS_EN = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    let targetMs = null;
    let rafId = null;

    const $ = (id) => document.getElementById(id);

    function pad(n) { return String(n).padStart(2, '0'); }

    function fmtDateTime(d) {
      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const wd = DAYS_EN[d.getDay()];
      const hh = pad(d.getHours());
      const mm = pad(d.getMinutes());
      return `${y}.${m}.${day} (${wd}) ${hh}:${mm}`;
    }

    function fmtTimeWithSeconds(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }

    function fmtElapsed(ms) {
      const totalSec = Math.floor(ms / 1000);
      const d = Math.floor(totalSec / 86400);
      const h = Math.floor((totalSec % 86400) / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (d > 0) return `${d}d ${h}h ${m}m`;
      if (h > 0) return `${h}h ${m}m ${pad(s)}s`;
      if (m > 0) return `${m}m ${pad(s)}s`;
      return `${s}s`;
    }

    function toDateInputValue(ms) {
      const d = new Date(ms);
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function readInputsToMs() {
      const dv = $('dateInput').value;
      if (!dv) return null;
      const [y, m, d] = dv.split('-').map(Number);
      const h = Number($('hourInput').value);
      const min = Number($('minuteInput').value);
      const t = new Date(y, m - 1, d, h, min, 0, 0).getTime();
      return Number.isFinite(t) ? t : null;
    }

    const MINUTE_STEP = 5;

    function writeMsToInputs(ms) {
      const d = new Date(ms);
      $('dateInput').value = toDateInputValue(ms);
      $('hourInput').value = String(d.getHours());
      const snapped = Math.round(d.getMinutes() / MINUTE_STEP) * MINUTE_STEP;
      $('minuteInput').value = String(snapped >= 60 ? 60 - MINUTE_STEP : snapped);
    }

    function populateSelectOptions() {
      const hourSel = $('hourInput');
      for (let h = 0; h < 24; h++) {
        const opt = document.createElement('option');
        opt.value = String(h);
        opt.textContent = pad(h);
        hourSel.appendChild(opt);
      }
      const minSel = $('minuteInput');
      for (let m = 0; m < 60; m += MINUTE_STEP) {
        const opt = document.createElement('option');
        opt.value = String(m);
        opt.textContent = pad(m);
        minSel.appendChild(opt);
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          target: targetMs,
          title: $('title').textContent.trim(),
        }));
      } catch (e) { /* ignore */ }
    }

    function loadState() {
      const url = new URL(window.location.href);
      const qTarget = url.searchParams.get('t');
      const qTitle = url.searchParams.get('title');
      if (qTarget) {
        const t = Number(qTarget);
        if (Number.isFinite(t)) targetMs = t;
      }
      if (qTitle) $('title').textContent = qTitle;

      if (targetMs == null) {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const s = JSON.parse(raw);
            if (Number.isFinite(s.target)) targetMs = s.target;
            if (s.title) $('title').textContent = s.title;
          }
        } catch (e) { /* ignore */ }
      }

    }

    function setTarget(ms, { sync = true } = {}) {
      targetMs = ms;
      writeMsToInputs(ms);
      if (sync) saveState();
      updateMeta();
      startLoop();
    }

    function updateMeta() {
      const now = new Date();
      if (targetMs == null) {
        $('metaTarget').textContent = 'Not set';
        $('metaNow').textContent = `${fmtDateTime(now)}:${pad(now.getSeconds())}`;
        return;
      }
      const target = new Date(targetMs);
      $('metaTarget').textContent = fmtDateTime(target);
      $('metaNow').textContent = isSameDay(target, now)
        ? fmtTimeWithSeconds(now)
        : `${fmtDateTime(now)}:${pad(now.getSeconds())}`;
    }

    const ACTIVE_HTML = `
      <div class="unit"><div class="number" id="days">--</div><div class="label">Days</div></div>
      <div class="unit"><div class="number" id="hours">--</div><div class="label">Hours</div></div>
      <div class="unit"><div class="number" id="minutes">--</div><div class="label">Min</div></div>
      <div class="unit"><div class="number" id="seconds">--</div><div class="label">Sec</div></div>`;

    const ELAPSED_HTML = `
      <div class="elapsed">
        <div class="number" id="elapsedNumber">--</div>
        <div class="label" id="elapsedLabel">Started ago</div>
      </div>`;

    const UNSET_HTML = `
      <div class="unset-prompt">
        <div>Set a target time to start the countdown</div>
        <div class="hint">Pick a date &amp; time below, or use a preset</div>
      </div>`;

    const STATE_HTML = {
      active: ACTIVE_HTML,
      expired: ELAPSED_HTML,
      unset: UNSET_HTML,
    };

    function setCountdownState(state) {
      const cd = $('countdown');
      if (cd.dataset.state === state) return;
      cd.dataset.state = state;
      cd.innerHTML = STATE_HTML[state];
    }

    const BADGE_TEXT = {
      upcoming: 'UPCOMING',
      started: 'STARTED',
      unset: 'NOT SET',
    };

    function setBadgeState(state) {
      const b = $('badge');
      if (b.dataset.state === state) return;
      b.dataset.state = state;
      b.textContent = BADGE_TEXT[state];
    }

    function render() {
      if (targetMs == null) {
        setCountdownState('unset');
        setBadgeState('unset');
        return;
      }

      const diff = targetMs - Date.now();

      if (diff <= 0) {
        setCountdownState('expired');
        setBadgeState('started');
        const elapsed = -diff;
        $('elapsedNumber').textContent = fmtElapsed(elapsed);
        $('elapsedLabel').textContent = 'Started ago';
        rafId = requestAnimationFrame(render);
        return;
      }

      setCountdownState('active');
      setBadgeState('upcoming');

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);

      $('days').textContent = pad(days);
      $('hours').textContent = pad(hours);
      $('minutes').textContent = pad(minutes);
      $('seconds').textContent = pad(seconds);

      rafId = requestAnimationFrame(render);
    }

    function startLoop() {
      if (rafId) cancelAnimationFrame(rafId);
      render();
    }

    // Event wiring
    $('setBtn').addEventListener('click', () => {
      const ms = readInputsToMs();
      if (ms != null) setTarget(ms);
    });

    $('title').addEventListener('input', () => {
      // If user cleared everything, collapse whitespace so :empty::before
      // placeholder can show.
      if (!$('title').textContent.trim()) $('title').textContent = '';
      saveState();
    });
    $('title').addEventListener('blur', saveState);
    $('title').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); $('title').blur(); }
    });

    document.querySelectorAll('[data-preset]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const mins = Number(btn.dataset.preset);
        const base = targetMs ?? Date.now();
        setTarget(base + mins * 60000);
      });
    });

    // Particles
    (function createParticles() {
      const container = $('particles');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (6 + Math.random() * 10) + 's';
        p.style.animationDelay = -(Math.random() * 16) + 's';
        p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(p);
      }
    })();

    // Init
    populateSelectOptions();
    loadState();
    if (targetMs == null) {
      writeMsToInputs(Date.now());
      updateMeta();
      render();
    } else {
      setTarget(targetMs, { sync: false });
    }
    setInterval(updateMeta, 1000);
  </script>
</body>
</html>
